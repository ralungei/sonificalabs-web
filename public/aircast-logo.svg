<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 350" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800&amp;display=swap');
            .logo-text {
                font-family: 'Outfit', system-ui, sans-serif;
                font-size: 140px;
                font-weight: 800;
                fill: #ffffff;
            }
        </style>

        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f0c29" />
            <stop offset="50%" stop-color="#302b63" />
            <stop offset="100%" stop-color="#24243e" />
        </linearGradient>

        <linearGradient id="micGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00e5ff" />
            <stop offset="100%" stop-color="#0077ff" />
        </linearGradient>

        <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <rect width="1000" height="350" rx="40" fill="url(#bgGrad)" />

    <text x="150" y="230" class="logo-text">a</text>

    <g transform="translate(330, 0)">

        <line x1="0" y1="125" x2="0" y2="230" stroke="url(#micGrad)" stroke-width="16" stroke-linecap="round" />
        <line x1="-20" y1="230" x2="20" y2="230" stroke="url(#micGrad)" stroke-width="14" stroke-linecap="round" />

        <path d="M -26 95 V 105 A 26 26 0 0 0 26 105 V 95" fill="none" stroke="url(#micGrad)" stroke-width="10" stroke-linecap="round" />
        <line x1="0" y1="131" x2="0" y2="140" stroke="url(#micGrad)" stroke-width="12" />

        <rect x="-16" y="55" width="32" height="48" rx="16" fill="none" stroke="url(#micGrad)" stroke-width="8" />
        <line x1="0" y1="55" x2="0" y2="103" stroke="url(#micGrad)" stroke-width="6" />
        <line x1="-8" y1="70" x2="8" y2="70" stroke="url(#micGrad)" stroke-width="4" />
        <line x1="-8" y1="88" x2="8" y2="88" stroke="url(#micGrad)" stroke-width="4" />

        <g filter="url(#neonGlow)">
            <path d="M -45 65 Q -60 79 -45 93" fill="none" stroke="#ff007a" stroke-width="6" stroke-linecap="round" />
            <path d="M -60 55 Q -80 79 -60 103" fill="none" stroke="#ff007a" stroke-width="6" stroke-linecap="round" />
            <path d="M 45 65 Q 60 79 45 93" fill="none" stroke="#ff007a" stroke-width="6" stroke-linecap="round" />
            <path d="M 60 55 Q 80 79 60 103" fill="none" stroke="#ff007a" stroke-width="6" stroke-linecap="round" />
        </g>
    </g>

    <text x="440" y="230" class="logo-text">rcast</text>

    <g transform="translate(820, 130)">
        <circle cx="0" cy="0" r="14" fill="#ff0033">
            <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="6" fill="#ffffff" />
    </g>
</svg>
